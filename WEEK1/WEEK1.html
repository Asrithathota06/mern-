<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./WEEK1.css">
    <title>Shopping Cart</title>
</head>
<body>
    <header>
    <h2>Shop Easy</h2>
    <nav>
    <a href="WEEK1.html" onclick="showpage('Login')">Login</a>
    <a href="register.html" onclick="showpage('Register')">Register</a>
    <a href="catalog.html" onclick="showpage('catalog')">Catalog</a>
    <a href="cart.html" onclick="showpage('cart')">Cart</a>
    </nav>
    </header>
    <div class="container">
        <div id="login" class="page">
            <h3>Login</h3>
            <form onsubmit="login(); return false;">
                <input id="loginUser" placeholder="Username">
                <input id="loginPass" type="password" placeholder="Password">
                <button type="submit">Login</button>
            </form>
        </div>

        

        <div id="catlog" class="page hidden">
            <h3>Product</h3>
            <div class="grid" id=products></div>
        </div>

        <div id="cart" class="page hidden">
            <h3>Cart</h3>
            <div class="cartItems"></div>
            <h4>Total</h4>
        </div>
    </div>
    <script src="week1.js"></script>
</body>
</html>

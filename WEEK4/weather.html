<!DOCTYPE html>
<html>
    <head>
        <title>Weather App</title>
        <script  src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </head>
    <style>
        body{
            color: azure;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            text-align: center;
        }
        h2{
            padding: 10px;
            color: black;
        }
        input,button{
            padding:10px;
            margin:10px;
        }
        button{
            justify-content: center;
            border-radius: 12px;
            background-color: rgb(86, 86, 226);
            color: azure;
        }
        canvas{
            width:80% !important;
            margin:auto;
        }
    </style>
    <body>
        <h2>Weather App</h2>
        <input type="text" id="apikey" placeholder="Enter API Key"><br>
        <input type="text" id="city" placeholder="Enter City"><br>
        <button onclick="getWeather()">Get Weather</button>
        <canvas id="chart"></canvas>

        <script>
            let myChart = null;
            const getWeather =async()=>{
                const API_KEY=document.getElementById('apikey').value;
                const city=document.getElementById('city').value;
                if(!API_KEY || !city){
                    alert("Enter API KEY AND  CITY");
                    return;
                }
                try {
                const res = await fetch(
  `https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${API_KEY}&units=metric`
);

const data = await res.json();

if (!res.ok) {
    console.log("API ERROR:", data);
    alert(data.message);
    return;
}

                const temp=data.list.slice(0,6).map(d=>d.main.temp);
                const labels=data.list.slice(0,6).map(d=>d.dt_txt);
                drawChart(labels,temp);
            } catch (err) {
            console.log(err);
            alert("Error fetching data");
        }
    };

            const processData=(data,callback)=>{
                callback(data);
            };

            const drawChart=(labels,temp)=>{
                if (myChart !== null) {
        myChart.destroy();
    }
                processData(temp,(t)=>{
                    new Chart(document.getElementById("chart"),{
                        type:"line",
                        data:{
                        labels:labels,
                        datasets: [{
                            label: "Temperature (°C)",
                            data: t,
                            borderColor: "blue",
                            fill: false
                        }]
                    }
                });
        });
    };
</script>

</body>
</html>

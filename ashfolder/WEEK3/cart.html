<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopLite | Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="cart">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-semibold" href="index.html">ShopLite</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav" aria-controls="topNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="topNav">
      <div class="navbar-nav ms-auto gap-lg-2">
        <a class="nav-link" href="index.html">Register</a>
        <a class="nav-link" href="login.html">Login</a>
        <a class="nav-link" href="catalog.html">Catalog</a>
        <a class="nav-link active" href="cart.html">Cart <span id="cartCount" class="badge text-bg-light ms-1">0</span></a>
      </div>
    </div>
  </div>
</nav>

<main class="page-shell py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="card cart-card border-0 shadow-sm">
          <div class="card-body p-4 p-md-5">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div>
                <p class="text-uppercase text-muted fw-semibold mb-1">Cart</p>
                <h1 class="h3 fw-bold mb-0">Your items</h1>
              </div>
              <span class="badge text-bg-dark">Live total</span>
            </div>
            <ul id="cartItems" class="list-group list-group-flush mb-3">
              <li class="list-group-item px-0 text-muted">No items added yet.</li>
            </ul>
            <div class="d-flex justify-content-between align-items-center border-top pt-3">
              <span class="fw-semibold">Total</span>
              <span id="cartTotal" class="fw-bold">₹0</span>
            </div>
            <div class="mt-4 d-flex gap-2 flex-wrap">
              <a class="btn btn-outline-dark" href="catalog.html">Back to catalog</a>
              <button id="clearCart" class="btn btn-dark">Clear cart</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>

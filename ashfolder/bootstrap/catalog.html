<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopLite | Catalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="catalog">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-semibold" href="index.html">ShopLite</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav" aria-controls="topNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="topNav">
      <div class="navbar-nav ms-auto gap-lg-2">
        <a class="nav-link" href="index.html">Register</a>
        <a class="nav-link" href="login.html">Login</a>
        <a class="nav-link active" href="catalog.html">Catalog</a>
        <a class="nav-link" href="cart.html">Cart <span id="cartCount" class="badge text-bg-light ms-1">0</span></a>
      </div>
    </div>
  </div>
</nav>

<main class="page-shell py-5">
  <div class="container">
    <div class="d-flex justify-content-between align-items-end flex-wrap gap-2 mb-4">
      <div>
        <p class="text-uppercase text-muted fw-semibold mb-1">Catalog</p>
        <h1 class="h3 fw-bold mb-0">Featured products</h1>
      </div>
      <a class="btn btn-outline-dark" href="cart.html">Go to cart</a>
    </div>

    <div class="row g-4">
      <div class="col-md-6 col-lg-3">
        <article class="card product-card h-100 border-0 shadow-sm">
          <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=800&q=80" alt="Running shoes" class="card-img-top product-image">
          <div class="card-body d-flex flex-column">
            <h2 class="h5">Running Shoes</h2>
            <p class="text-muted mb-3">Lightweight daily wear.</p>
            <div class="mt-auto d-flex justify-content-between align-items-center">
              <span class="fw-bold">₹2,499</span>
              <button class="btn btn-outline-dark btn-sm add-to-cart" data-name="Running Shoes" data-price="2499">Add</button>
            </div>
          </div>
        </article>
      </div>

      <div class="col-md-6 col-lg-3">
        <article class="card product-card h-100 border-0 shadow-sm">
          <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=800&q=80" alt="Smart watch" class="card-img-top product-image">
          <div class="card-body d-flex flex-column">
            <h2 class="h5">Smart Watch</h2>
            <p class="text-muted mb-3">Simple fitness tracking.</p>
            <div class="mt-auto d-flex justify-content-between align-items-center">
              <span class="fw-bold">₹3,999</span>
              <button class="btn btn-outline-dark btn-sm add-to-cart" data-name="Smart Watch" data-price="3999">Add</button>
            </div>
          </div>
        </article>
      </div>

      <div class="col-md-6 col-lg-3">
        <article class="card product-card h-100 border-0 shadow-sm">
          <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?auto=format&fit=crop&w=800&q=80" alt="Headphones" class="card-img-top product-image">
          <div class="card-body d-flex flex-column">
            <h2 class="h5">Headphones</h2>
            <p class="text-muted mb-3">Clear sound, compact fit.</p>
            <div class="mt-auto d-flex justify-content-between align-items-center">
              <span class="fw-bold">₹1,799</span>
              <button class="btn btn-outline-dark btn-sm add-to-cart" data-name="Headphones" data-price="1799">Add</button>
            </div>
          </div>
        </article>
      </div>

      <div class="col-md-6 col-lg-3">
        <article class="card product-card h-100 border-0 shadow-sm">
          <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?auto=format&fit=crop&w=800&q=80" alt="Backpack" class="card-img-top product-image">
          <div class="card-body d-flex flex-column">
            <h2 class="h5">Backpack</h2>
            <p class="text-muted mb-3">Everyday carry bag.</p>
            <div class="mt-auto d-flex justify-content-between align-items-center">
              <span class="fw-bold">₹1,299</span>
              <button class="btn btn-outline-dark btn-sm add-to-cart" data-name="Backpack" data-price="1299">Add</button>
            </div>
          </div>
        </article>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>

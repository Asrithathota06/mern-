<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopLite | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="login">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-semibold" href="index.html">ShopLite</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav" aria-controls="topNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="topNav">
      <div class="navbar-nav ms-auto gap-lg-2">
        <a class="nav-link" href="index.html">Register</a>
        <a class="nav-link active" href="login.html">Login</a>
        <a class="nav-link" href="catalog.html">Catalog</a>
        <a class="nav-link" href="cart.html">Cart <span id="cartCount" class="badge text-bg-light ms-1">0</span></a>
      </div>
    </div>
  </div>
</nav>

<main class="page-shell py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="card auth-card shadow-lg border-0">
          <div class="card-body p-4 p-md-5">
            <p class="text-uppercase text-muted fw-semibold mb-1">Login</p>
            <h1 class="h3 fw-bold mb-3">Welcome back</h1>
            <form id="loginForm" novalidate>
              <div class="mb-3">
                <label for="loginEmail" class="form-label">Email address</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="name@example.com">
                <div class="invalid-feedback">Enter a valid email address.</div>
              </div>
              <div class="mb-3">
                <label for="loginPassword" class="form-label">Password</label>
                <input type="password" id="loginPassword" class="form-control" placeholder="Your password">
                <div class="invalid-feedback">Password must be at least 6 characters.</div>
              </div>
              <button type="submit" class="btn btn-dark w-100 py-2">Login</button>
              <p id="loginMessage" class="small mt-3 mb-0 text-success fw-medium"></p>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>

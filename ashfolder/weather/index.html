<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App (ES6)</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 700px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            padding: 10px;
            width: 70%;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            background: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background: #0056b3;
        }

        canvas {
            margin-top: 30px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Weather Graph (OpenWeather API)</h2>

    <input 
        type="text" 
        id="city" 
        placeholder="Enter City"
        onkeypress="if(event.key==='Enter') getWeather()"
    >

    <br>

    <button id="weatherBtn">Get Weather</button>

    <canvas id="chart"></canvas>
</div>

<script>

    const API_KEY = "86583a4fa46e0c89d17d27cd117ff9d7";

    let weatherChart = null;

    // Async Function
    const getWeather = async () => {

        const city = document.getElementById("city").value.trim();

        if (!city) {
            alert("Please enter a city");
            return;
        }

        try {

            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${API_KEY}&units=metric`
            );

            const data = await res.json();

            if (data.cod !== "200") {
                alert("Invalid city or API key");
                return;
            }

            const temps = data.list
                .slice(0, 5)
                .map(item => item.main.temp);

            const labels = data.list
                .slice(0, 5)
                .map(item => item.dt_txt);

            drawChart(labels, temps);

        } catch (err) {
            console.error(err);
            alert("Error fetching weather data");
        }
    };

    // Callback Example
    const processData = (data, callback) => {
        callback(data);
    };

    // Draw Chart
    const drawChart = (labels, temps) => {

        processData(temps, (t) => {

            if (weatherChart) {
                weatherChart.destroy();
            }

            weatherChart = new Chart(
                document.getElementById("chart"),
                {
                    type: "line",

                    data: {
                        labels: labels,

                        datasets: [{
                            label: "Temperature (°C)",
                            data: t,
                            borderColor: "blue",
                            backgroundColor: "rgba(0,123,255,0.1)",
                            tension: 0.3,
                            fill: true
                        }]
                    }
                }
            );
        });
    };

    // ADD EVENT LISTENER HERE
    document
        .getElementById("weatherBtn")
        .addEventListener("click", getWeather);

</script>
</body>
</html>

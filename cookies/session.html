<!DOCTYPE html>
<html>
<head>
    <title>Session Tracking</title>
</head>
<body>

<h2>Cookies Example</h2>
<form action="http://localhost:8080/MyApp/cookie" method="get">
    Enter Name: <input type="text" name="username">
    <input type="submit" value="Set Cookie">
</form>

<br>
<a href="http://localhost:8080/MyApp/cookie">Get Cookie</a>

<hr>

<h2>HTTP Session Example</h2>
<form action="http://localhost:8080/MyApp/session" method="get">
    Enter Name: <input type="text" name="user">
    <input type="submit" value="Set Session">
</form>

<br>
<a href="http://localhost:8080/MyApp/session">Get Session</a>

</body>
</html>
